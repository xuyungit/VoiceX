<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceX HUD</title>
  <link rel="stylesheet" href="./hud.css">
</head>

<body class="hud-loading">
  <div id="hud">
    <div class="hud-container">
      <div class="status-area">
        <div class="status-icon" id="statusIcon">
          <!-- Mic icon (Push-to-Talk) -->
          <svg class="icon icon-mic" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z" />
            <path
              d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
          </svg>
          <!-- Waveform icon (Hands-Free) -->
          <svg class="icon icon-waveform" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm7-.17v6.34L7.83 13H5v-2h2.83L10 8.83zM16.5 12A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
          </svg>
          <!-- Cloud icon (Batch ASR recognizing) -->
          <svg class="icon icon-cloud" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6a5.5 5.5 0 0 1 5.3 4.02l.3 1.01 1.05.07c1.52.1 2.85 1.35 2.85 2.9 0 1.65-1.35 3-3 3z"/>
          </svg>
          <!-- Wand icon (AI Correction) -->
          <svg class="icon icon-wand" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M7.5 5.6L10 7 8.6 4.5 10 2 7.5 3.4 5 2l1.4 2.5L5 7l2.5-1.4zm12 9.8L17 14l1.4 2.5L17 19l2.5-1.4L22 19l-1.4-2.5L22 14l-2.5 1.4zM22 2l-2.5 1.4L17 2l1.4 2.5L17 7l2.5-1.4L22 7l-1.4-2.5L22 2zM9.37 17.03L7.03 14.69l8.48-8.48 2.34 2.34-8.48 8.48zm-.7 1.4l2.34-2.34 2.34 2.34-2.34 2.34-2.34-2.34z" />
          </svg>
        </div>
        <div class="countdown" id="countdown"></div>
        <div class="intent-chip" id="intentChip"></div>
      </div>
      <div class="text-area" id="textArea"></div>
      <div class="waveform-bars" id="waveformBars" aria-hidden="true"></div>
      <canvas class="waveform-hybrid" id="waveformHybridCanvas" aria-hidden="true"></canvas>
    </div>
  </div>
  <script type="module" src="./hud.ts"></script>
</body>

</html>
