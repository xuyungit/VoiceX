name: windows-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build on Windows
        required: true
        type: string
      upload_to_release:
        description: Upload built Windows bundles to the existing GitHub Release for this tag
        required: false
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.event.release.id || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      DEFAULT_BRANCH: main
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Verify tag commit is on main
        shell: bash
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          git merge-base --is-ancestor HEAD "origin/${DEFAULT_BRANCH}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare CMake wrapper
        shell: pwsh
        run: |
          $cmake = (Get-Command cmake -ErrorAction Stop).Source
          $wrapper = Join-Path $PWD 'cmake-wrap.cmd'

          @"
          @echo off
          setlocal
          echo %* | findstr /C:"--build" >nul
          if %errorlevel%==0 (
            "$cmake" %*
          ) else (
            "$cmake" -DCMAKE_POLICY_VERSION_MINIMUM=3.5 %*
          )
          "@ | Set-Content -Path $wrapper -Encoding ASCII

          "CMAKE=$wrapper" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and upload Windows bundles to GitHub Release
        if: github.event_name == 'release'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ env.TAG_NAME }}

      - name: Build Windows bundles for manual test
        if: github.event_name == 'workflow_dispatch'
        run: pnpm tauri build

      - name: Upload manual test bundles
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_release != true
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-${{ env.TAG_NAME }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 3

      - name: Upload manual bundles to existing GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_release == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${TAG_NAME}" \
            src-tauri/target/release/bundle/msi/*.msi \
            src-tauri/target/release/bundle/nsis/*.exe \
            --clobber
